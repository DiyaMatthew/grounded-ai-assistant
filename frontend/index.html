<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Semantic Search Assistant</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface-2:   #22263a;
      --border:      #2e3250;
      --border-2:    #3d4268;
      --text:        #e8eaf6;
      --text-muted:  #8b90b8;
      --accent:      #6c63ff;
      --accent-dim:  #2d2b5e;
      --teal:        #00c9a7;
      --teal-dim:    #0a3d35;
      --amber:       #f5a623;
      --amber-dim:   #3a2a0a;
      --user-bg:     #1e3a5f;
      --user-border: #2a5080;
      --bot-bg:      #1a1d27;
      --radius:      12px;
      --radius-sm:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    header p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .corpus-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid #1a5a50;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Chat window ─────────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .msg {
      max-width: 780px;
      width: 100%;
    }

    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Typing cursor while streaming */
    .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--accent);
      border-radius: 1px;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Citations block ─────────────────────────────────────────── */
    .citations {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .citations-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 8px;
    }

    .citation-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .citation-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }

    .citation-item:hover {
      border-color: var(--border-2);
      background: var(--surface-2);
    }

    .citation-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .badge-arxiv {
      background: var(--accent-dim);
      color: #a09bff;
      border: 1px solid #4a45aa;
    }

    .badge-ukgov {
      background: var(--teal-dim);
      color: var(--teal);
      border: 1px solid #1a5a50;
    }

    .citation-text { flex: 1; }

    .citation-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 2px;
    }

    .citation-score {
      font-size: 11px;
      color: var(--text-muted);
    }

    .citation-arrow {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    /* ── Relevance bar ───────────────────────────────────────────── */
    .rel-bar {
      display: inline-block;
      width: 40px; height: 3px;
      background: var(--border);
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 4px;
      overflow: hidden;
    }

    .rel-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 2px;
    }

    /* ── Suggested queries ───────────────────────────────────────── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .suggestion-chip {
      font-size: 12px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    /* ── Welcome screen ──────────────────────────────────────────── */
    #welcome {
      max-width: 560px;
      margin: auto;
      text-align: center;
      padding: 2rem 1rem;
    }

    #welcome h2 { font-size: 22px; margin-bottom: 8px; }
    #welcome p  { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    /* ── Input area ──────────────────────────────────────────────── */
    #input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      max-width: 780px;
      margin: 0 auto;
    }

    #query-input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
      resize: none;
      height: 42px;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
    }

    #query-input:focus  { border-color: var(--accent); }
    #query-input::placeholder { color: var(--text-muted); }

    .btn {
      padding: 0 18px;
      height: 42px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border: none;
      display: flex; align-items: center; gap: 6px;
    }

    #send-btn {
      background: var(--accent);
      color: #fff;
    }
    #send-btn:hover  { background: #5a52e8; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    #stop-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: none;
    }
    #stop-btn:hover { border-color: var(--border-2); color: var(--text); }
    #stop-btn.visible { display: flex; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header>
  <div class="logo">🔍</div>
  <div>
    <h1>AI Semantic Search Assistant</h1>
    <p>arXiv papers · UK Gov AI policy</p>
  </div>
  <span class="corpus-badge" id="corpus-badge">Loading corpus…</span>
</header>

<!-- ── Chat ────────────────────────────────────────────────────────── -->
<div id="chat">
  <div id="welcome">
    <h2>Ask anything about AI</h2>
    <p>Powered by real arXiv research papers and UK government AI policy documents.</p>
    <div class="welcome-chips">
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">What is retrieval-augmented generation?</button>
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">How does the UK regulate AI?</button>
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">Explain transformer attention mechanisms</button>
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">What is RLHF?</button>
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">AI safety and alignment</button>
      <button class="suggestion-chip" onclick="submitQuery(this.textContent)">How are LLMs fine-tuned?</button>
    </div>
  </div>
</div>

<!-- ── Input ────────────────────────────────────────────────────────── -->
<div id="input-area">
  <div class="input-row">
    <textarea
      id="query-input"
      placeholder="Ask a question about AI research or UK policy…"
      rows="1"
    ></textarea>
    <button class="btn" id="send-btn" onclick="handleSend()">
      Send
    </button>
    <button class="btn" id="stop-btn" onclick="handleStop()">
      Stop
    </button>
  </div>
  <p class="input-hint">Results grounded in your corpus · Sources shown after each answer</p>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
const API_BASE   = " ";
const SESSION_ID = "session_" + Math.random().toString(36).slice(2, 9);
let   activeES   = null;    // active EventSource
let   streaming  = false;

// ── DOM refs ───────────────────────────────────────────────────────────
const chatEl    = document.getElementById("chat");
const inputEl   = document.getElementById("query-input");
const sendBtn   = document.getElementById("send-btn");
const stopBtn   = document.getElementById("stop-btn");
const welcomeEl = document.getElementById("welcome");

// ── Corpus health badge ────────────────────────────────────────────────
async function loadCorpusStats() {
  try {
    const res  = await fetch(`${API_BASE}/health`);
    const data = await res.json();
    if (data.ready) {
      const badge = document.getElementById("corpus-badge");
      badge.textContent =
        `${data.total_chunks.toLocaleString()} chunks indexed`;
    }
  } catch (_) {
    document.getElementById("corpus-badge").textContent = "offline";
  }
}
loadCorpusStats();

// ── Auto-resize textarea ───────────────────────────────────────────────
inputEl.addEventListener("input", () => {
  inputEl.style.height = "42px";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ── Main send handler ──────────────────────────────────────────────────
function handleSend() {
  const query = inputEl.value.trim();
  if (!query || streaming) return;
  submitQuery(query);
}

function submitQuery(query) {
  if (streaming) return;

  // Hide welcome screen on first message
  if (welcomeEl) welcomeEl.remove();

  inputEl.value = "";
  inputEl.style.height = "42px";

  appendUserBubble(query);
  const botBubble = appendBotBubble();
  streamResponse(query, botBubble);
}

// ── SSE streaming ──────────────────────────────────────────────────────
function streamResponse(query, bubble) {
  setStreaming(true);

  const url = `${API_BASE}/search?q=${encodeURIComponent(query)}&session_id=${SESSION_ID}`;
  activeES  = new EventSource(url);

  const textEl    = bubble.querySelector(".bubble-text");
  const cursorEl  = bubble.querySelector(".cursor");
  let   fullText  = "";

  activeES.onmessage = (event) => {
    if (event.data === "[DONE]") {
      cursorEl.remove();
      setStreaming(false);
      activeES.close();
      activeES = null;
      appendSuggestions(bubble);
      scrollToBottom();
      return;
    }

    let payload;
    try { payload = JSON.parse(event.data); }
    catch (_) { return; }

    if (payload.type === "token") {
      fullText += payload.text;
      textEl.textContent = fullText;
      scrollToBottom();

    } else if (payload.type === "sources") {
      // ── Insert citations block ──────────────────────────
      renderCitations(bubble, payload.sources);

    } else if (payload.type === "error") {
      textEl.textContent = "Something went wrong: " + payload.message;
      cursorEl.remove();
      setStreaming(false);
    }
  };

  activeES.onerror = () => {
    if (streaming) {
      textEl.textContent += "\n\n[Connection lost. Is the server running?]";
      cursorEl.remove();
      setStreaming(false);
    }
    activeES.close();
  };
}

// ── Render citations ───────────────────────────────────────────────────
function renderCitations(bubble, sources) {
  if (!sources || sources.length === 0) return;

  const citEl = document.createElement("div");
  citEl.className = "citations";

  const label = document.createElement("div");
  label.className = "citations-label";
  label.textContent = `Sources (${sources.length})`;
  citEl.appendChild(label);

  const list = document.createElement("div");
  list.className = "citation-list";

  sources.forEach(src => {
    const item = document.createElement("a");
    item.className  = "citation-item";
    item.href       = src.url || "#";
    item.target     = "_blank";
    item.rel        = "noopener noreferrer";

    // Source badge: arXiv or UK Gov
    const isArxiv  = src.source === "arXiv";
    const badgeEl  = document.createElement("span");
    badgeEl.className = "citation-badge " + (isArxiv ? "badge-arxiv" : "badge-ukgov");
    badgeEl.textContent = src.source;
    item.appendChild(badgeEl);

    // Title + relevance score
    const textWrap = document.createElement("div");
    textWrap.className = "citation-text";

    const titleEl = document.createElement("div");
    titleEl.className   = "citation-title";
    titleEl.textContent = src.title || "Untitled";
    textWrap.appendChild(titleEl);

    const scoreEl  = document.createElement("div");
    const scorePct = Math.round((src.score || 0) * 100);
    scoreEl.className   = "citation-score";
    scoreEl.innerHTML   =
      `Relevance: ${scorePct}%` +
      `<span class="rel-bar"><span class="rel-fill" style="width:${scorePct}%"></span></span>`;
    textWrap.appendChild(scoreEl);
    item.appendChild(textWrap);

    // Arrow icon
    const arrow = document.createElement("span");
    arrow.className   = "citation-arrow";
    arrow.textContent = "↗";
    item.appendChild(arrow);

    list.appendChild(item);
  });

  citEl.appendChild(list);
  bubble.querySelector(".bubble").appendChild(citEl);
}

// ── Append suggested follow-up chips ──────────────────────────────────
function appendSuggestions(bubble) {
  const followUps = [
    "Can you explain that in simpler terms?",
    "What are the practical applications?",
    "How does this compare to traditional approaches?",
  ];

  const wrap = document.createElement("div");
  wrap.className = "suggestions";

  followUps.forEach(q => {
    const chip = document.createElement("button");
    chip.className   = "suggestion-chip";
    chip.textContent = q;
    chip.onclick     = () => submitQuery(q);
    wrap.appendChild(chip);
  });

  bubble.appendChild(wrap);
}

// ── DOM helpers ────────────────────────────────────────────────────────
function appendUserBubble(text) {
  const msg = document.createElement("div");
  msg.className = "msg user";
  msg.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chatEl.appendChild(msg);
  scrollToBottom();
  return msg;
}

function appendBotBubble() {
  const msg = document.createElement("div");
  msg.className = "msg bot";
  msg.innerHTML = `
    <div class="bubble">
      <span class="bubble-text"></span><span class="cursor"></span>
    </div>`;
  chatEl.appendChild(msg);
  scrollToBottom();
  return msg;
}

function setStreaming(on) {
  streaming = on;
  sendBtn.disabled = on;
  stopBtn.classList.toggle("visible", on);
}

function handleStop() {
  if (activeES) {
    activeES.close();
    activeES = null;
  }
  setStreaming(false);
  // Remove any dangling cursor
  document.querySelectorAll(".cursor").forEach(c => c.remove());
}

function scrollToBottom() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
</script>
</body>
</html>
